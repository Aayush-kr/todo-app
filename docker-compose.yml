services:
  backend:
    build: ./todo-backend
    container_name: backend
    restart: always
    env_file: 
      - ./todo-backend/.env
    ports:
      - "3000:3000"
  frontend:
    build: ./todo-frontend
    container_name: frontend
    restart: always
    env_file: 
      - ./todo-frontend/.env
    ports:
      - "3001:3001"    
    depends_on: 
      - backend
